aid: durable-functions
name: Azure Durable Functions
description: >-
  Azure Durable Functions is a serverless extension for writing stateful workflows and orchestrations in code using
  Azure Functions. The extension exposes built-in HTTP APIs for managing orchestrations, durable entities, and task
  hubs.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
