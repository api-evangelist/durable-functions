      - name: getentity
        method: GET
        description: Get entity
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: signalentity
        method: POST
        description: Signal entity
        inputParameters:
        - name: op
          in: query
          type: string
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: runtime-webhooks-durabletask-entities-entityname
      path: /runtime/webhooks/durabletask/entities/{entityName}
